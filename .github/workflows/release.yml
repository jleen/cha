name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # The tag is the de facto shipped version: docker/metadata-action derives the
  # image tags from it, and tauri-action names the GitHub release after it. But
  # the version *inside* the artifacts comes from [workspace.package] in
  # Cargo.toml, and nothing otherwise ties the two together — so a mistyped or
  # forgotten-to-bump tag would publish `cha-web:0.6.0` containing a binary that
  # reports 0.5.0. Gate both jobs on this so it fails before anything is pushed;
  # a pushed GHCR tag can't be quietly taken back.
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Read the manifest directly rather than via `cargo metadata`, which would
      # want a toolchain and a registry index just to answer this.
      - name: Tag must match the workspace version
        run: |
          crate=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])")
          tag=${GITHUB_REF_NAME#v}
          if [ "$crate" != "$tag" ]; then
            echo "::error::Tag $GITHUB_REF_NAME implies version $tag, but Cargo.toml declares $crate. Bump [workspace.package] version or retag."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches the workspace version $crate."

  # The cha-web container image. Independent of the Tauri job below — a failure
  # in one shouldn't block the other, since they ship to different places for
  # different audiences.
  docker:
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # No setup-qemu-action: deploy/Dockerfile pins its builder stage to
      # BUILDPLATFORM and cross-compiles, so both architectures are built
      # natively on this amd64 runner. Adding QEMU back would silently do
      # nothing — the Dockerfile never asks to be emulated.
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercases the owner (GHCR requires it) and derives the tag list:
      # v1.2.3 -> :1.2.3, :1.2, :latest
      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cha-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Repo root, not deploy/ — the build needs cha-core, cha-web, and
          # cha-gui/ui (the front end is embedded into the binary).
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: verify-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Write Apple API key (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 --decode > /tmp/apple_api_key.p8

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_PATH: ${{ matrix.platform == 'macos-latest' && '/tmp/apple_api_key.p8' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cha ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          projectPath: cha-gui/src-tauri
          args: ${{ matrix.args }}
