# nginx in front of cha-web — included not because nginx is recommended over
# Caddy, but as the proof that cha-web is proxy-neutral: it needs no special
# headers, no WebSocket upgrade, no sticky sessions, no path rewriting.
#
# Unlike Caddy, nginx does not obtain certificates itself; use certbot or
# similar. Pair with docker-compose.yml, which publishes on 127.0.0.1:8080.

# Optional rate limiting. cha-web has none of its own, and a search costs real
# CPU — unlike a static file, so the usual "nginx can absorb it" intuition
# doesn't apply. 10r/s with a burst is generous for human use.
limit_req_zone $binary_remote_addr zone=cha:10m rate=10r/s;

server {
    listen 443 ssl;
    http2 on;
    server_name cha.example.com;

    ssl_certificate     /etc/letsencrypt/live/cha.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cha.example.com/privkey.pem;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location / {
        limit_req zone=cha burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A search is bounded at 2s server-side, so anything past this is a stall
        # rather than slow work.
        proxy_read_timeout 10s;

        # cha-web sets its own Content-Security-Policy and nginx passes it
        # through. Don't add another: multiple CSP headers intersect rather than
        # override, and debugging that is miserable.
    }

    # Health endpoint, if you want the proxy to check the upstream. Kept out of
    # the access log since it fires every few seconds.
    location = /healthz {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }
}

server {
    listen 80;
    server_name cha.example.com;
    return 301 https://$host$request_uri;
}
