# Minimal cha-web deployment.
#
#   mkdir -p dictionaries && cp /path/to/words.txt dictionaries/
#   docker compose -f deploy/docker-compose.yml up -d
#
# The image ships no dictionary. Put one or more plain-text files (one word per
# line) in ./dictionaries — each file becomes a separately labeled word list,
# named after the file. The server reads them once at startup, so adding a list
# needs `docker compose restart`.

services:
  cha-web:
    # Both keys on purpose. With `build:` present, compose builds the image
    # locally when it isn't already there and tags it with the name below — so a
    # fresh clone just works. To use the published image instead, run
    # `docker compose pull` first (or `up --pull always`); to force a rebuild
    # after changing the source, `up --build`.
    image: ghcr.io/jleen/cha-web:latest
    build:
      # The repo root, not deploy/ — the build needs cha-core, cha-web, and
      # cha-gui/ui (the front end is compiled into the binary).
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped

    # Published on loopback only, because the expected setup is a reverse proxy
    # on the same host terminating TLS (see Caddyfile / nginx.conf). Change to
    # "8080:8080" to expose it directly on the LAN — but read the security note
    # in README.md first: there is no rate limiting and no authentication.
    ports:
      - "127.0.0.1:8080:8080"

    volumes:
      - ./dictionaries:/dictionaries:ro

    environment:
      # CHA_BIND and CHA_PORT are already set correctly in the image; override
      # only if you change the published port above.
      CHA_DICT_DIR: /dictionaries
      # Cap simultaneous searches. Defaults to the container's visible CPU count;
      # set it explicitly if you've limited CPU below, or excess requests will be
      # admitted and then fight over less CPU than the server thinks it has.
      # CHA_MAX_CONCURRENT: "4"
      # Log level. tower_http=info logs one line per request.
      RUST_LOG: "cha_web=info,tower_http=warn"

    # A search saturates a core, so without a limit a burst can starve anything
    # else on the box. The server's own concurrency cap bounds parallelism; this
    # bounds the damage if that's misconfigured.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

    # Defense in depth: the server writes nothing and needs no privileges.
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
