<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cha</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <input
        id="pattern"
        type="text"
        placeholder="Enter a pattern…  (e.g. .y...l  or  ;ilphone)"

        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        autofocus
      />
      <div id="status"></div>
    </header>
    <main id="results"></main>
    <script src="main.js"></script>
  </body>
</html>
